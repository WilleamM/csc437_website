<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pull Day Workout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/reset.css" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/page.css" />
  <script type="importmap">
  {
    "imports": {
      "@unbndl/auth": "https://unpkg.com/@unbndl/auth",
      "@unbndl/html": "https://unpkg.com/@unbndl/html",
      "@unbndl/view": "https://unpkg.com/@unbndl/view"
    }
  }
  </script>
  <script type="module">
    import { define } from "@unbndl/html";
    import { Auth } from "@unbndl/auth";
    import { WorkoutHeaderElement } from "/js/header.js";
    import { WorkoutExerciseElement } from "/js/workout-exercise.js";
    import { WorkoutExercisesElement } from "/js/workout-exercises.js";

    define({
      "auth-provider": Auth.Provider,
      "wt-header": WorkoutHeaderElement,
      "workout-exercise": WorkoutExerciseElement,
      "workout-exercises": WorkoutExercisesElement
    });
  </script>
</head>
<body>
  <auth-provider>
  <wt-header></wt-header>

  <main>
    <h1>Pull Day</h1>
    <dl>
      <dt>Date</dt>
      <dd>April 16, 2026</dd>
      <dt>Duration</dt>
      <dd>58 minutes</dd>
      <dt>Plan</dt>
      <dd><a href="plan.html">Push Pull Legs - 6 Day Split</a></dd>
    </dl>

    <div class="workout-stats">
      <div class="stat-box">
        <div class="stat-label">Total Volume</div>
        <div class="stat-value">9,825 lbs</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Exercises</div>
        <div class="stat-value">3</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Workout</div>
        <div class="stat-value">5 of 5</div>
      </div>
    </div>

    <h2>Exercises</h2>
    <workout-exercises src="/data/workout-5.json"></workout-exercises>
  </main>
  </auth-provider>
</body>
</html>
