<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/reset.css" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/page.css" />
</head>
<body>
  <header>
    <h1>Workout Tracker</h1>
      <label id="dark-mode-label">
        <input type="checkbox" autocomplete="off"/>
        Dark Mode
      </label>
    <nav>
      <a href="user.html">My Profile</a>
      <a href="plan.html">My Workout Plan</a>
      <a href="goal.html">My Goal</a>
    </nav>
  </header>

  <main>
    <h2>My Workouts</h2>
    <ul>
      <li><a href="workout-1.html">Monday - Upper Body</a></li>
      <li><a href="workout-2.html">Wednesday - Lower Body</a></li>
      <li><a href="workout-3.html">Friday - Full Body</a></li>
    </ul>
  </main>

  <script>
    document.getElementById("dark-mode-label").onchange = function(event) {
      const checked = event.target.checked;
      const customEvent = new CustomEvent("darkmode:toggle", {
        bubbles: true,
        detail: { darkMode:checked}
      });
      event.currentTarget.dispatchEvent(customEvent);
      event.stopPropagation();
    };

    document.body.addEventListener("darkmode:toggle", function(event) {
      if (event.detail.darkMode) {
        event.currentTarget.classList.add("dark-mode");
      } else {
        event.currentTarget.classList.remove("dark-mode");
      }
    });
  </script>
  
</body>
</html>
