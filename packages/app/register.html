<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register — Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/reset.css" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/page.css" />
  <script type="module" src="/src/register.ts"></script>
</head>
<body>
  <auth-provider>
    <header>
      <a href="/app" class="app-name">Workout Tracker</a>
    </header>

    <main>
      <h1>Create Account</h1>
      <login-form api="/auth/register">
        <label>
          <span>Name</span>
          <input name="name" autocomplete="off" />
        </label>
        <label>
          <span>Username</span>
          <input name="username" autocomplete="off" />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" />
        </label>
        <p id="login-error" style="color: red; display: none;">Username already taken.</p>
      </login-form>
      <p>Already have an account? <a href="/login.html">Sign in here.</a></p>
    </main>
  </auth-provider>
</body>
</html>
